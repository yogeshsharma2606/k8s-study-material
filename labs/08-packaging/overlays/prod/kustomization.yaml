apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
namePrefix: prod-
commonLabels:
  environment: production
replicas:
  - name: web
    count: 3
images:
  - name: nginx
    newTag: 1.25-alpine
patches:
  - target:
      kind: Deployment
      name: web
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/resources/limits
        value:
          memory: 128Mi
