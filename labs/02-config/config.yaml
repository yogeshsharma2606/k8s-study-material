apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: study
data:
  APP_MODE: production
  APP_LOG_LEVEL: info
  config.json: |
    {"featureX": true}
---
apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  namespace: study
type: Opaque
stringData:
  API_KEY: demo-key-not-for-production
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-demo
  namespace: study
spec:
  replicas: 1
  selector:
    matchLabels:
      app: config-demo
  template:
    metadata:
      labels:
        app: config-demo
    spec:
      containers:
        - name: app
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "APP_MODE=$APP_MODE API_KEY set=$(test -n \"$API_KEY\" && echo yes)"
              cat /etc/config/config.json
              sleep 3600
          envFrom:
            - configMapRef:
                name: app-config
          env:
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: API_KEY
          volumeMounts:
            - name: config-vol
              mountPath: /etc/config
              readOnly: true
      volumes:
        - name: config-vol
          configMap:
            name: app-config
