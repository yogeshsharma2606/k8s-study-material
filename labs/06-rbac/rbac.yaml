apiVersion: v1
kind: ServiceAccount
metadata:
  name: reader-sa
  namespace: study
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pod-reader
  namespace: study
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: read-pods
  namespace: study
subjects:
  - kind: ServiceAccount
    name: reader-sa
    namespace: study
roleRef:
  kind: Role
  name: pod-reader
  apiGroup: rbac.authorization.k8s.io
